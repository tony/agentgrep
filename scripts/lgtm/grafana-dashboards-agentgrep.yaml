apiVersion: 1

# Adds the agentgrep dashboard suite alongside otel-lgtm's built-in RED/JVM
# providers (Grafana loads every *.yaml in this directory). The JSON is
# generated by scripts/lgtm/generate_dashboards.py, which up.sh runs on
# startup, and mounted read-only at the path below.
providers:
  - name: agentgrep
    type: file
    folder: agentgrep
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /otel-lgtm/dashboards-agentgrep
      foldersFromFilesStructure: false
