# Repo-owned copy of the otel-lgtm image default (/otel-lgtm/otelcol-config.yaml),
# bind-mounted by scripts/lgtm/up.sh. The ONLY change from the stock config is the
# deltatocumulative processor on the metrics pipeline: agentgrep's one-shot CLI /
# benchmark / profile-engine processes export DELTA metrics in live mode (each
# process emits its increment, then dies), and this processor sums those deltas
# into one climbing cumulative series in the long-lived collector so rate() /
# increase() work across processes. Cumulative inputs (the prometheus/collector
# self-scrape) pass through untouched. Dev-stack only; deltatocumulative is alpha.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
  prometheus/collector:
    config:
      scrape_configs:
        - job_name: "opentelemetry-collector"
          scrape_interval: 1s
          static_configs:
            - targets: ["127.0.0.1:8888"]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: "/ready"

processors:
  batch:
  deltatocumulative:
    max_stale: 5m

exporters:
  otlp_http/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp
    tls:
      insecure: true
  otlp_http/traces:
    endpoint: http://127.0.0.1:4418
    tls:
      insecure: true
  otlp_http/logs:
    endpoint: http://127.0.0.1:3100/otlp
    tls:
      insecure: true
  otlp/profiles:
    endpoint: http://127.0.0.1:4040
    tls:
      insecure: true
  debug/metrics:
    verbosity: detailed
  debug/traces:
    verbosity: detailed
  debug/logs:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/traces]
      #exporters: [otlp_http/traces,debug/traces]
    metrics:
      receivers: [otlp, prometheus/collector]
      processors: [batch, deltatocumulative]
      exporters: [otlp_http/metrics]
      #exporters: [otlp_http/metrics,debug/metrics]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/logs]
      #exporters: [otlp_http/logs,debug/logs]
    profiles:
      receivers: [otlp]
      exporters: [otlp/profiles]
