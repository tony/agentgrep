# Default benchmark definitions for `scripts/benchmark.py`.
#
# Override per-machine with `scripts/benchmark.local.toml` (gitignored)
# or via `--config PATH`. CLI flags trump every TOML layer.
#
# Templating tokens in `command`: {venv}, {query}, {sha}, {short_sha}, {repo}.
# Unknown placeholders raise — fail loudly rather than emit a broken command.

[settings]
warmup = 1
runs = 3
trunk = "master"
sync_command = "uv sync --quiet"
venv = ".venv"
timeout_seconds = 300

[bench.grep-limit-1]
description = "rg-shaped grep, limit 1"
command = "{venv}/bin/agentgrep grep --no-progress --limit 1 {query}"
default_query = "libtmux"
skip_if_missing = "grep"

[bench.find]
description = "fd-shaped source enumeration"
command = "{venv}/bin/agentgrep find --no-progress {query}"
default_query = "libtmux"

[bench.find-query-language]
description = "Source-predicate find (agent: prune), fd-shaped enumeration"
command = "{venv}/bin/agentgrep find --no-progress {query}"
default_query = "agent:codex"

[bench.search-limit-1]
description = "search, limit 1"
command = "{venv}/bin/agentgrep search --no-progress --limit 1 {query}"
default_query = "libtmux"

[bench.grep-all-prompts-json-limit-50]
description = "All-agent prompt grep, JSON output, limit 50"
command = "{venv}/bin/agentgrep grep --no-progress --agent all --scope prompts --limit 50 --json {query}"
default_query = "tmux"
skip_if_missing = "grep"

[bench.grep-all-conversations-json-limit-50]
description = "All-agent conversation grep, JSON output, limit 50"
command = "{venv}/bin/agentgrep grep --no-progress --agent all --scope conversations --limit 50 --json {query}"
default_query = "tmux"
skip_if_missing = "grep"

[bench.search-all-prompts-json-limit-50]
description = "All-agent prompt search, JSON output, limit 50"
command = "{venv}/bin/agentgrep search --no-progress --agent all --scope prompts --limit 50 --no-rank --no-group --json {query}"
default_query = "tmux"

[bench.find-all-prompts-json-limit-500]
description = "All-agent prompt-source enumeration, JSON output, limit 500"
command = "{venv}/bin/agentgrep find --no-progress --agent all --type prompts --json --limit 500"
default_query = ""

[bench.profile-grep-all-prompts-json-limit-500]
description = "Profiling: all-agent prompt grep, JSON output, limit 500"
command = "{venv}/bin/agentgrep grep --no-progress --agent all --scope prompts --limit 500 --json {query}"
default_query = "tmux"
skip_if_missing = "grep"

[bench.profile-grep-all-conversations-json-limit-500]
description = "Profiling: all-agent conversation grep, JSON output, limit 500"
command = "{venv}/bin/agentgrep grep --no-progress --agent all --scope conversations --limit 500 --json {query}"
default_query = "tmux"
skip_if_missing = "grep"

[bench.profile-search-all-prompts-ranked-json-limit-50]
description = "Profiling: all-agent prompt search with ranking, JSON output, limit 50"
command = "{venv}/bin/agentgrep search --no-progress --agent all --scope prompts --limit 50 --json {query}"
default_query = "tmux"

[bench.profile-search-all-conversations-json-limit-50]
description = "Profiling: all-agent conversation search, JSON output, limit 50"
command = "{venv}/bin/agentgrep search --no-progress --agent all --scope conversations --limit 50 --no-rank --no-group --json {query}"
default_query = "tmux"

[bench.profile-find-all-json-limit-500]
description = "Profiling: all-agent source enumeration, JSON output, limit 500"
command = "{venv}/bin/agentgrep find --no-progress --agent all --json --limit 500"
default_query = ""

[bench.profile-engine-search-all-prompts-limit-500]
description = "Profiling: engine-only all-agent prompt search, sanitized JSON profile, limit 500"
command = "{venv}/bin/python scripts/profile_engine.py search-prompts --agent all --limit 500 --format json {query}"
default_query = "tmux"

[bench.profile-engine-search-all-conversations-limit-500]
description = "Profiling: engine-only all-agent conversation search, sanitized JSON profile, limit 500"
command = "{venv}/bin/python scripts/profile_engine.py search-conversations --agent all --limit 500 --format json {query}"
default_query = "tmux"

[bench.profile-engine-grep-all-prompts-max-count-500]
description = "Profiling: engine-only all-agent prompt grep, sanitized JSON profile, max-count 500"
command = "{venv}/bin/python scripts/profile_engine.py grep-prompts --agent all --max-count 500 --format json {query}"
default_query = "tmux"

[bench.profile-engine-grep-all-conversations-max-count-500]
description = "Profiling: engine-only all-agent conversation grep, sanitized JSON profile, max-count 500"
command = "{venv}/bin/python scripts/profile_engine.py grep-conversations --agent all --max-count 500 --format json {query}"
default_query = "tmux"

[bench.profile-engine-find-all-prompts-limit-500]
description = "Profiling: engine-only all-agent prompt-source enumeration, sanitized JSON profile, limit 500"
command = "{venv}/bin/python scripts/profile_engine.py find-prompts --agent all --limit 500 --format json"
default_query = ""

[bench.profile-engine-search-all-prompts-query-limit-500]
description = "Profiling: engine-only all-agent prompt search with a query-language predicate, sanitized JSON profile, limit 500"
command = "{venv}/bin/python scripts/profile_engine.py search-prompts --agent all --limit 500 --format json --query-language {query}"
default_query = "agent:codex deploy"

[bench.profile-engine-search-all-conversations-query-limit-500]
description = "Profiling: engine-only all-agent conversation search with a query-language predicate, sanitized JSON profile, limit 500"
command = "{venv}/bin/python scripts/profile_engine.py search-conversations --agent all --limit 500 --format json --query-language {query}"
default_query = "(agent:codex OR agent:claude) model:* deploy"

[bench.profile-engine-grep-all-prompts-query-max-count-500]
description = "Profiling: engine-only all-agent prompt grep with a query-language predicate, sanitized JSON profile, max-count 500"
command = "{venv}/bin/python scripts/profile_engine.py grep-prompts --agent all --max-count 500 --format json --query-language {query}"
default_query = "(agent:codex OR agent:cursor-cli) deploy"

[bench.profile-engine-grep-all-conversations-query-max-count-500]
description = "Profiling: engine-only all-agent conversation grep with a query-language predicate, sanitized JSON profile, max-count 500"
command = "{venv}/bin/python scripts/profile_engine.py grep-conversations --agent all --max-count 500 --format json --query-language {query}"
default_query = "timestamp:[2026-01 TO 2026-12] model:* bliss"

[bench.profile-engine-search-cursor-ide-prompts-limit-500]
description = "Profiling: engine-only Cursor IDE SQLite prompt search, sanitized JSON profile, limit 500"
command = "{venv}/bin/python scripts/profile_engine.py search-prompts --agent cursor-ide --limit 500 --format json {query}"
default_query = "agentgrep-cursor-db-no-match"

[bench.profile-engine-search-cursor-ide-conversations-limit-500]
description = "Profiling: engine-only Cursor IDE SQLite conversation search, sanitized JSON profile, limit 500"
command = "{venv}/bin/python scripts/profile_engine.py search-conversations --agent cursor-ide --limit 500 --format json {query}"
default_query = "agentgrep-cursor-db-no-match"

[bench.profile-engine-grep-cursor-ide-prompts-max-count-500]
description = "Profiling: engine-only Cursor IDE SQLite prompt grep, sanitized JSON profile, max-count 500"
command = "{venv}/bin/python scripts/profile_engine.py grep-prompts --agent cursor-ide --max-count 500 --format json {query}"
default_query = "agentgrep-cursor-db-no-match"

[bench.profile-engine-grep-cursor-ide-conversations-max-count-500]
description = "Profiling: engine-only Cursor IDE SQLite conversation grep, sanitized JSON profile, max-count 500"
command = "{venv}/bin/python scripts/profile_engine.py grep-conversations --agent cursor-ide --max-count 500 --format json {query}"
default_query = "agentgrep-cursor-db-no-match"

[bench.profile-engine-find-cursor-ide-prompts-limit-500]
description = "Profiling: engine-only Cursor IDE SQLite prompt-source enumeration, sanitized JSON profile, limit 500"
command = "{venv}/bin/python scripts/profile_engine.py find-prompts --agent cursor-ide --limit 500 --format json"
default_query = ""

[bench.import-time]
description = "Cold-start CLI import + arg parse only"
command = "{venv}/bin/agentgrep --help"
default_query = ""

[bench.import-time-query]
description = "Query-module import cost (the stack the opt-in gate defers off the cold path)"
command = "{venv}/bin/python -c \"import agentgrep.query\""
default_query = ""
