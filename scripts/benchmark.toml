# Default benchmark definitions for `scripts/benchmark.py`.
#
# Override per-machine with `scripts/benchmark.local.toml` (gitignored)
# or via `--config PATH`. CLI flags trump every TOML layer.
#
# Templating tokens in `command`: {venv}, {query}, {sha}, {short_sha}, {repo}.
# Unknown placeholders raise — fail loudly rather than emit a broken command.

[settings]
warmup = 1
runs = 3
trunk = "master"
sync_command = "uv sync --quiet"
venv = ".venv"
timeout_seconds = 300

[bench.grep]
description = "rg-shaped grep, exit at first match"
command = "{venv}/bin/agentgrep grep --no-progress -m 1 {query}"
default_query = "libtmux"
skip_if_missing = "grep"

[bench.find]
description = "fd-shaped source enumeration"
command = "{venv}/bin/agentgrep find --no-progress {query}"
default_query = "libtmux"

[bench.search]
description = "search, exit after first match"
command = "{venv}/bin/agentgrep search --no-progress --limit 1 {query}"
default_query = "libtmux"

[bench.grep-all-prompts-json]
description = "All-agent prompt grep, JSON output, capped at 50 matches"
command = "{venv}/bin/agentgrep grep --no-progress --agent all --scope prompts -m 50 --json {query}"
default_query = "tmux"
skip_if_missing = "grep"

[bench.grep-all-conversations-json]
description = "All-agent conversation grep, JSON output, capped at 50 matches"
command = "{venv}/bin/agentgrep grep --no-progress --agent all --scope conversations -m 50 --json {query}"
default_query = "tmux"
skip_if_missing = "grep"

[bench.search-all-prompts-json]
description = "All-agent prompt search, JSON output, capped at 50 matches"
command = "{venv}/bin/agentgrep search --no-progress --agent all --scope prompts --limit 50 --no-rank --no-group --json {query}"
default_query = "tmux"

[bench.find-all-prompts-json]
description = "All-agent prompt-source enumeration, JSON output, capped at 500 sources"
command = "{venv}/bin/agentgrep find --no-progress --agent all --type prompts --json --limit 500"
default_query = ""

[bench.import-time]
description = "Cold-start CLI import + arg parse only"
command = "{venv}/bin/agentgrep --help"
default_query = ""
